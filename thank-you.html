<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Request</title>
    <style>
        body {
            background-color: #000000;
            /* black background */
            color: #ffffff;
            /* white text */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }


        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
        }

        .reset-container {
            background-color: #111111;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px #1DB954;
        }

        h1 {
            margin-bottom: 30px;
        }

        input[type="text"] {
            padding: 10px;
            width: 100%;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
        }

        button {
            background-color: #1DB954;
            /* green button */
            color: #000000;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #1DB954;
        }

        p {
            margin-top: 20px;
            font-size: 14px;
            color: #aaaaaa;
        }
    </style>
</head>

<body>
    <div class="reset-container">
        <img src="logo.png" alt="Logo" class="logo">
        <h1>Request Recieved</h1>
        <p>Your Spotify name has been successfully updated.</p>
    </div>
</body>

</html>
